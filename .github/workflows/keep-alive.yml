name: Keep Alive Pinger
on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping All Services
        run: |
          curl -s -o /dev/null -w "Render: %{http_code}\n" "${{ secrets.RENDER_URL }}" || true
          curl -s -o /dev/null -w "Vercel: %{http_code}\n" "${{ secrets.VERCEL_URL }}" || true
          curl -s -o /dev/null -w "Supabase: %{http_code}\n" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" || true
          curl -s -o /dev/null -w "MongoDB: %{http_code}\n" "${{ secrets.MONGODB_URL }}" || true
